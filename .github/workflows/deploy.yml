name: Frontend CI/CD (Hope4All)

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug (IMPORTANT - removes your path issues forever)
      - name: Show project structure
        run: ls -R

      # 3. Setup Node (NO CACHE = avoids all your previous errors)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 4. Install dependencies (explicit cd = no working-directory issues)
      - name: Install dependencies
        run: |
          cd frontend/Hope4All
          npm ci

      # 5. Build Expo Web
      - name: Build frontend
        run: |
          cd frontend/Hope4All
          npx expo export -p web

      # 6. Detect build folder safely
      - name: Detect build output
        run: |
          cd frontend/Hope4All

          if [ -d "dist" ]; then
            echo "BUILD_DIR=frontend/Hope4All/dist" >> $GITHUB_ENV
          elif [ -d "web-build" ]; then
            echo "BUILD_DIR=frontend/Hope4All/web-build" >> $GITHUB_ENV
          else
            echo "❌ Build folder not found"
            exit 1
          fi

      # 7. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 8. Upload to S3
      - name: Deploy to S3
        run: |
          aws s3 sync $BUILD_DIR s3://$S3_BUCKET_NAME --delete

      # 9. CloudFront invalidation
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

      # 10. Success
      - name: Done
        run: echo "🚀 Deployment successful"