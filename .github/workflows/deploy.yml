name: Frontend CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Debug structure (keep for safety)
      - name: Show structure
        run: ls -R

      # 3. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 4. Install dependencies (ROOT LEVEL)
      - name: Install dependencies
        run: npm ci

      # 5. Build Expo web (ROOT LEVEL)
      - name: Build web app
        run: npx expo export -p web

      # 6. Detect build folder
      - name: Detect build output
        run: |
          if [ -d "dist" ]; then
            echo "BUILD_DIR=dist" >> $GITHUB_ENV
          elif [ -d "web-build" ]; then
            echo "BUILD_DIR=web-build" >> $GITHUB_ENV
          else
            echo "❌ No build folder found"
            exit 1
          fi

      # 7. AWS config
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 8. Deploy to S3
      - name: Upload to S3
        run: aws s3 sync $BUILD_DIR s3://$S3_BUCKET_NAME --delete

      # 9. CloudFront invalidate
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

      # 10. Done
      - name: Success
        run: echo "🚀 Deployment successful"