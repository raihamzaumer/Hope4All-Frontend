name: Frontend CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/Hope4All

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node (NO CACHE = avoids your error completely)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies (stable mode)
      - name: Install dependencies
        run: npm ci

      # 4. Build Expo Web
      - name: Build frontend
        run: npx expo export -p web

      # 5. Detect build folder safely
      - name: Detect build output
        run: |
          if [ -d "dist" ]; then
            echo "BUILD_DIR=dist" >> $GITHUB_ENV
          elif [ -d "web-build" ]; then
            echo "BUILD_DIR=web-build" >> $GITHUB_ENV
          else
            echo "Build failed: no output folder found"
            exit 1
          fi

      # 6. Configure AWS
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 7. Deploy to S3
      - name: Upload to S3
        run: |
          aws s3 sync $BUILD_DIR s3://$S3_BUCKET_NAME --delete

      # 8. CloudFront invalidate
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

      # 9. Done
      - name: Success
        run: echo "Frontend deployed successfully 🚀"